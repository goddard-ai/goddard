packages:
  - app
  - app/styled-system
  - core/*
  - core/daemon/client
  - native/*
  - playground/*
  - features/*
  - workforce

catalog:
  "@agentclientprotocol/sdk": ^0.22.1
  "@b9g/async-context": ^0.2.1
  "@clack/prompts": ^1.3.0
  "@floating-ui/dom": ^1.7.6
  "@happy-dom/global-registrator": ^20.9.0
  "@pandacss/dev": ^1.10.0
  "@preact/signals": ^2.9.0
  "@tsrx/bun-plugin-preact": 0.0.56
  "@tsrx/preact": 0.1.33
  "@types/hash-sum": ^1.0.2
  acp-client: ^0.5.3
  ai-sdk-json-schema: ^0.3.1
  bun: 1.3.14
  cmd-ts: ^0.15.0
  hash-sum: ^2.0.0
  kindstore: ^0.4.5
  kleur: ^4.1.5
  mitt: ^3.0.1
  preact: 11.0.0-beta.1
  radashi: ^12.8.0
  rouzer: ^5.3.1
  tabbable: ^6.4.0
  zod: ^4.3.6

minimumReleaseAge: 20160 # 14 days
minimumReleaseAgeExclude:
  - "@agentclientprotocol/sdk"
  - "@remix-run/route-pattern"
  - acp-client
  - ai-sdk-json-schema
  - bumped-version
  - electrobun
  - kindstore
  - powerkeys
  - preact-sigma
  - procband
  - radashi
  - rouzer
  - sculpted
  - state-launcher

  # Turbo
  - turbo
  - "@turbo/darwin-64"
  - "@turbo/darwin-arm64"
  - "@turbo/linux-64"
  - "@turbo/linux-arm64"
  - "@turbo/windows-64"
  - "@turbo/windows-arm64"

  # TSRX
  - "@tsrx/bun-plugin-preact"
  - "@tsrx/core"
  - "@tsrx/eslint-parser"
  - "@tsrx/eslint-plugin"
  - "@tsrx/preact"
  - "@tsrx/prettier-plugin"
  - "@tsrx/typescript-plugin"
  - "@tsrx/vite-plugin-preact"
  - esrap

allowBuilds:
  bun: true
  esbuild: true
  sharp: true
  workerd: true

patchedDependencies:
  "@tsrx/core": patches/@tsrx__core.patch
  "@tsrx/preact": patches/@tsrx__preact.patch
  "@tsrx/prettier-plugin": patches/@tsrx__prettier-plugin.patch
