name: Publish UI Primitives

on:
  push:
    branches:
      - main
    paths:
      - "core/ui-primitives/**"

permissions:
  contents: write
  id-token: write

env:
  BUN_VERSION: 1.3.11
  PACKAGE_DIR: core/ui-primitives
  PACKAGE_TAG_PREFIX: ui-primitives-v

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Setup git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Infer next version
        id: version
        env:
          PACKAGE_DIR: ${{ env.PACKAGE_DIR }}
          PACKAGE_TAG_PREFIX: ${{ env.PACKAGE_TAG_PREFIX }}
        run: |
          current_version="$(bun -e "console.log(require('./$PACKAGE_DIR/package.json').version)")"
          bumped_tag="$(git-cliff --bumped-version --tag "${PACKAGE_TAG_PREFIX}${current_version}" --tag-pattern "${PACKAGE_TAG_PREFIX}[0-9]*" --include-path "${PACKAGE_DIR}/**")"
          next_version="${bumped_tag#${PACKAGE_TAG_PREFIX}}"

          echo "current=$current_version" >> "$GITHUB_OUTPUT"
          echo "next=$next_version" >> "$GITHUB_OUTPUT"

          if [ "$next_version" = "$current_version" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Version remains $current_version; skipping publish."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Next version is $next_version."
          fi

      - name: Install dependencies
        if: steps.version.outputs.changed == 'true'
        run: bun install --frozen-lockfile

      - name: Build package
        if: steps.version.outputs.changed == 'true'
        run: bun --cwd ${{ env.PACKAGE_DIR }} run build

      - name: Configure release git identity
        if: steps.version.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit and tag package version
        if: steps.version.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          NEXT_VERSION: ${{ steps.version.outputs.next }}
          PACKAGE_TAG_PREFIX: ${{ env.PACKAGE_TAG_PREFIX }}
        run: |
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          bunx bumpp --release "$NEXT_VERSION" --yes --commit "chore(ui-primitives): release $NEXT_VERSION" --tag "${PACKAGE_TAG_PREFIX}${NEXT_VERSION}" --push --no-verify package.json
        working-directory: ${{ env.PACKAGE_DIR }}

      - name: Setup npm publishing
        if: steps.version.outputs.changed == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Publish package
        if: steps.version.outputs.changed == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public
        working-directory: ${{ env.PACKAGE_DIR }}
