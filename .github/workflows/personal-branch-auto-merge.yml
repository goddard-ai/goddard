name: Personal branch auto-merge

on:
  schedule:
    # GitHub Actions schedules use UTC; 10:00 UTC is 5:00 AM EST.
    - cron: "0 10 * * *"
  workflow_dispatch:

permissions:
  checks: read
  contents: write
  pull-requests: write
  statuses: read

concurrency:
  group: personal-branch-auto-merge-aleclarson
  cancel-in-progress: true

env:
  USER_BRANCH: aleclarson
  BASE_BRANCH: main

jobs:
  auto-merge:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version-file: ".bun-version"

      - name: Merge when ready
        env:
          GH_TOKEN: ${{ github.token }}
        run: bun run ./scripts/personal-branch-auto-merge.ts
