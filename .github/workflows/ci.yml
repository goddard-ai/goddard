name: CI

on:
  pull_request:
  push:
    branches:
      - next

permissions:
  contents: read

env:
  NODE_VERSION: 24
  PNPM_VERSION: 11.5.1
  GITHUB_EVENT_BEFORE: ${{ github.event.before }}

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve Bun version
        id: bun-version
        shell: bash
        run: |
          version="$(node -e "const v = require('./package.json').catalog?.bun; if (!v) throw new Error('package.json#catalog.bun is required'); process.stdout.write(v)")"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Setup Bun
        id: setup-bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ steps.bun-version.outputs.version }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Cache turbo build setup
        uses: actions/cache@v5.0.5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        if: github.event_name == 'pull_request'
        run: |
          pnpm turbo run codegen --filter="...[origin/${{ github.base_ref }}]" --output-logs=errors-only
          pnpm turbo run typecheck --filter="...[origin/${{ github.base_ref }}]" --output-logs=errors-only

      - name: Typecheck
        if: github.event_name == 'push'
        run: |
          pnpm turbo run codegen --filter="...[${{ env.GITHUB_EVENT_BEFORE }}]" --output-logs=errors-only
          pnpm turbo run typecheck --filter="...[${{ env.GITHUB_EVENT_BEFORE }}]" --output-logs=errors-only

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve Bun version
        id: bun-version
        shell: bash
        run: |
          version="$(node -e "const v = require('./package.json').catalog?.bun; if (!v) throw new Error('package.json#catalog.bun is required'); process.stdout.write(v)")"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Setup Bun
        id: setup-bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ steps.bun-version.outputs.version }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Cache turbo build setup
        uses: actions/cache@v5.0.5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        if: github.event_name == 'pull_request'
        run: pnpm turbo run lint --filter="...[origin/${{ github.base_ref }}]" --output-logs=errors-only

      - name: Lint
        if: github.event_name == 'push'
        run: pnpm turbo run lint --filter="...[${{ env.GITHUB_EVENT_BEFORE }}]" --output-logs=errors-only

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve Bun version
        id: bun-version
        shell: bash
        run: |
          version="$(node -e "const v = require('./package.json').catalog?.bun; if (!v) throw new Error('package.json#catalog.bun is required'); process.stdout.write(v)")"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Setup Bun
        id: setup-bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ steps.bun-version.outputs.version }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Cache turbo build setup
        uses: actions/cache@v5.0.5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test
        if: github.event_name == 'pull_request'
        run: |
          pnpm turbo run codegen --filter="...[origin/${{ github.base_ref }}]" --output-logs=errors-only
          pnpm turbo run test --filter="...[origin/${{ github.base_ref }}]" --output-logs=errors-only

      - name: Test
        if: github.event_name == 'push'
        run: |
          pnpm turbo run codegen --filter="...[${{ env.GITHUB_EVENT_BEFORE }}]" --output-logs=errors-only
          pnpm turbo run test --filter="...[${{ env.GITHUB_EVENT_BEFORE }}]" --output-logs=errors-only
