name: CI

on:
  pull_request:
  push:
    branches:
      - next

permissions:
  contents: read

env:
  NODE_VERSION: 24
  PNPM_VERSION: 11.5.1
  GITHUB_EVENT_BEFORE: ${{ github.event.before }}

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Bun
        id: setup-bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version-file: ".bun-version"

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Cache turbo build setup
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check Bun runtime pin
        run: pnpm run check:bun-runtime

      - name: Typecheck
        if: github.event_name == 'pull_request'
        run: |
          pnpm turbo run codegen --filter="...[origin/${{ github.base_ref }}]" --output-logs=errors-only
          pnpm turbo run typecheck --filter="...[origin/${{ github.base_ref }}]" --output-logs=errors-only

      - name: Typecheck
        if: github.event_name == 'push'
        run: |
          pnpm turbo run codegen --filter="...[${{ env.GITHUB_EVENT_BEFORE }}]" --output-logs=errors-only
          pnpm turbo run typecheck --filter="...[${{ env.GITHUB_EVENT_BEFORE }}]" --output-logs=errors-only

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Bun
        id: setup-bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version-file: ".bun-version"

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Cache turbo build setup
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        if: github.event_name == 'pull_request'
        run: pnpm turbo run lint --filter="...[origin/${{ github.base_ref }}]" --output-logs=errors-only

      - name: Lint
        if: github.event_name == 'push'
        run: pnpm turbo run lint --filter="...[${{ env.GITHUB_EVENT_BEFORE }}]" --output-logs=errors-only

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Bun
        id: setup-bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version-file: ".bun-version"

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Cache turbo build setup
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test
        if: github.event_name == 'pull_request'
        run: |
          pnpm turbo run codegen --filter="...[origin/${{ github.base_ref }}]" --output-logs=errors-only
          pnpm turbo run test --filter="...[origin/${{ github.base_ref }}]" --output-logs=errors-only

      - name: Test
        if: github.event_name == 'push'
        run: |
          pnpm turbo run codegen --filter="...[${{ env.GITHUB_EVENT_BEFORE }}]" --output-logs=errors-only
          pnpm turbo run test --filter="...[${{ env.GITHUB_EVENT_BEFORE }}]" --output-logs=errors-only
