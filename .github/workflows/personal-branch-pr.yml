name: Personal branch PR

on:
  push:
    branches:
      - aleclarson
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: personal-branch-pr-aleclarson
  cancel-in-progress: true

env:
  USER_BRANCH: aleclarson
  BASE_BRANCH: main
  PR_TITLE: "Merge aleclarson into main"
  PR_BODY: "This is the ongoing PR for changes from `aleclarson` into `main`."

jobs:
  open-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Check whether user branch is ahead of main
        id: ahead
        shell: bash
        run: |
          set -euo pipefail

          git init repo
          cd repo
          git remote add origin "https://github.com/${{ github.repository }}.git"

          git fetch --no-tags --depth=1 origin "$BASE_BRANCH"
          git fetch --no-tags origin "$USER_BRANCH"

          ahead_count="$(git rev-list --count "origin/$BASE_BRANCH..origin/$USER_BRANCH")"
          echo "count=$ahead_count" >> "$GITHUB_OUTPUT"

      - name: Ensure PR exists
        if: steps.ahead.outputs.count != '0'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          existing_pr="$(
            gh pr list \
              --repo "${{ github.repository }}" \
              --base "$BASE_BRANCH" \
              --head "$USER_BRANCH" \
              --state open \
              --json number \
              --jq '.[0].number // empty'
          )"

          if [ -n "$existing_pr" ]; then
            echo "PR #$existing_pr already open."
            pr_number="$existing_pr"
          else
            pr_number="$(
              gh api \
                --method POST \
                "repos/${{ github.repository }}/pulls" \
                --raw-field base="$BASE_BRANCH" \
                --raw-field head="$USER_BRANCH" \
                --raw-field title="$PR_TITLE" \
                --raw-field body="$PR_BODY" \
                --jq '.number'
            )"
            echo "Opened PR #$pr_number."
          fi

          gh pr merge "$pr_number" \
              --repo "${{ github.repository }}" \
              --auto \
              --rebase
