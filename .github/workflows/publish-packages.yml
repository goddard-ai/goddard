name: Publish Packages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "core/ui-primitives/**"

env:
  BUN_VERSION: 1.3.13
  NODE_VERSION: 24
  PNPM_VERSION: 11.5.1

jobs:
  build-pack:
    name: Build and pack ${{ matrix.name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      changed: ${{ steps.version.outputs.changed }}
      next: ${{ steps.version.outputs.next }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ui-primitives
            path: core/ui-primitives

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Infer next version
        id: version
        env:
          PACKAGE_DIR: ${{ matrix.path }}
          PACKAGE_RELEASE_NAME: ${{ matrix.name }}
        run: |
          current_version="$(node -e "console.log(require('./$PACKAGE_DIR/package.json').version)")"
          latest_tag="$(git tag --merged HEAD --list "${PACKAGE_RELEASE_NAME}@[0-9]*" --sort=-v:refname | head -n 1)"

          if [ -z "$latest_tag" ]; then
            next_version="0.1.0"
          else
            next_version="$(pnpm exec bumped-version "$PACKAGE_DIR")"
          fi

          bumped_tag="${PACKAGE_RELEASE_NAME}@${next_version}"

          echo "current=$current_version" >> "$GITHUB_OUTPUT"
          echo "next=$next_version" >> "$GITHUB_OUTPUT"

          if [ "$next_version" = "$current_version" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Version remains $current_version; skipping publish."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Next version is $next_version."
          fi

      - name: Check package
        if: steps.version.outputs.changed == 'true'
        run: |
          pnpm run --if-present codegen
          pnpm run --if-present typecheck
          pnpm run --if-present lint
          pnpm run --if-present test
        working-directory: ${{ matrix.path }}

      - name: Build package
        if: steps.version.outputs.changed == 'true'
        run: pnpm run build
        working-directory: ${{ matrix.path }}

      - name: Configure release git identity
        if: steps.version.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit package version
        if: steps.version.outputs.changed == 'true'
        env:
          NEXT_VERSION: ${{ steps.version.outputs.next }}
          PACKAGE_RELEASE_NAME: ${{ matrix.name }}
        run: |
          pnpm version "$NEXT_VERSION" --message "chore(release): ${PACKAGE_RELEASE_NAME}@${NEXT_VERSION}" --no-git-tag-version
          git tag "${PACKAGE_RELEASE_NAME}@${NEXT_VERSION}"
        working-directory: ${{ matrix.path }}

      - name: Pack package
        if: steps.version.outputs.changed == 'true'
        run: |
          pnpm pack --out "$PWD/package.tgz"
          if node -e "const { files } = require('./package.json'); process.exit(Array.isArray(files) && files.includes('dist') ? 0 : 1)"; then
            tar -tzf package.tgz | grep -q '^package/dist/'
          fi
        working-directory: ${{ matrix.path }}

      - name: Upload package artifact
        if: steps.version.outputs.changed == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ${{ matrix.name }}-package
          path: ${{ matrix.path }}/package.tgz
          if-no-files-found: error

  publish:
    name: Publish and push ${{ matrix.name }} release
    runs-on: ubuntu-latest
    needs: build-pack
    if: needs.build-pack.outputs.changed == 'true'
    permissions:
      contents: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ui-primitives
            path: core/ui-primitives

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Download package artifact
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53
        with:
          name: ${{ matrix.name }}-package
          path: ${{ matrix.path }}

      - name: Print publish tool versions
        run: |
          node --version
          npm --version

      - name: Publish package
        run: npm publish ./package.tgz --provenance --access public --ignore-scripts
        working-directory: ${{ matrix.path }}

      - name: Configure release git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Tag package version
        env:
          NEXT_VERSION: ${{ needs.build-pack.outputs.next }}
          PACKAGE_RELEASE_NAME: ${{ matrix.name }}
        run: |
          pnpm version "$NEXT_VERSION" --message "chore(release): ${PACKAGE_RELEASE_NAME}@${NEXT_VERSION}" --no-git-tag-version
          git tag "${PACKAGE_RELEASE_NAME}@${NEXT_VERSION}"
        working-directory: ${{ matrix.path }}

      - name: Push release commit and tag
        env:
          GH_TOKEN: ${{ github.token }}
          NEXT_VERSION: ${{ needs.build-pack.outputs.next }}
          PACKAGE_RELEASE_NAME: ${{ matrix.name }}
        run: |
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin HEAD:${GITHUB_REF_NAME} "${PACKAGE_RELEASE_NAME}@${NEXT_VERSION}"
