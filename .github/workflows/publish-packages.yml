name: Publish Packages

on:
  push:
    branches:
      - main
    paths:
      - "core/ui-primitives/**"

permissions:
  contents: write
  id-token: write

env:
  BUN_VERSION: 1.3.11

jobs:
  publish:
    name: Publish ${{ matrix.name }} to npm
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ui-primitives
            path: core/ui-primitives

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Setup git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Infer next version
        id: version
        env:
          PACKAGE_DIR: ${{ matrix.path }}
          PACKAGE_RELEASE_NAME: ${{ matrix.name }}
        run: |
          current_version="$(bun -e "console.log(require('./$PACKAGE_DIR/package.json').version)")"
          latest_tag="$(git tag --merged HEAD --list "${PACKAGE_RELEASE_NAME}@[0-9]*" --sort=-v:refname | head -n 1)"

          if [ -z "$latest_tag" ]; then
            bumped_tag="${PACKAGE_RELEASE_NAME}@0.1.0"
          else
            bumped_tag="$(git-cliff --bumped-version --use-branch-tags --tag "$latest_tag" --tag-pattern "${PACKAGE_RELEASE_NAME}@[0-9]*" --include-path "${PACKAGE_DIR}/**")"
          fi

          next_version="${bumped_tag#${PACKAGE_RELEASE_NAME}@}"

          echo "current=$current_version" >> "$GITHUB_OUTPUT"
          echo "next=$next_version" >> "$GITHUB_OUTPUT"

          if [ "$next_version" = "$current_version" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Version remains $current_version; skipping publish."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Next version is $next_version."
          fi

      - name: Install dependencies
        if: steps.version.outputs.changed == 'true'
        run: bun install --frozen-lockfile

      - name: Build package
        if: steps.version.outputs.changed == 'true'
        run: bun --cwd ${{ matrix.path }} run build

      - name: Configure release git identity
        if: steps.version.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit package version
        if: steps.version.outputs.changed == 'true'
        env:
          NEXT_VERSION: ${{ steps.version.outputs.next }}
          PACKAGE_RELEASE_NAME: ${{ matrix.name }}
        run: |
          bun pm version "$NEXT_VERSION" --message "chore(release): ${PACKAGE_RELEASE_NAME}@${NEXT_VERSION}" --no-git-tag-version
          git tag "${PACKAGE_RELEASE_NAME}@${NEXT_VERSION}"
        working-directory: ${{ matrix.path }}

      - name: Pack package
        if: steps.version.outputs.changed == 'true'
        id: pack
        run: |
          tarball="$(bun pm pack --quiet)"
          echo "tarball=$tarball" >> "$GITHUB_OUTPUT"
        working-directory: ${{ matrix.path }}

      - name: Publish package
        if: steps.version.outputs.changed == 'true'
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: bunx npm publish "./${{ steps.pack.outputs.tarball }}" --provenance --access public
        working-directory: ${{ matrix.path }}

      - name: Push release commit and tag
        if: steps.version.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          NEXT_VERSION: ${{ steps.version.outputs.next }}
          PACKAGE_RELEASE_NAME: ${{ matrix.name }}
        run: |
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin HEAD:${GITHUB_REF_NAME} "${PACKAGE_RELEASE_NAME}@${NEXT_VERSION}"
